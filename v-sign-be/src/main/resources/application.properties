spring.application.name=history-talk-backend
server.port=8080

spring.config.import=optional:classpath:secretKey.properties

spring.mvc.servlet.path=/V-sign

# =============================================
# Database (values injected via ENV at runtime)
# =============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.schema=${DB_SCHEMA}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

# =============================================
# Flyway
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=${DB_SCHEMA}
spring.flyway.validate-on-migrate=false

# =============================================
# JWT (values injected via ENV at runtime)
# =============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION_MS}

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.enable-kotlin=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# =============================================
# Frontend / AI service integration
# =============================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
ai.service.predict-timeout-ms=${AI_SERVICE_PREDICT_TIMEOUT_MS:10000}
app.payment.public-base-url=${APP_PAYMENT_PUBLIC_BASE_URL:https://payments.example.invalid}

# =============================================
# PayOS Payment Gateway
# =============================================
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}
payos.return-url=${PAYOS_RETURN_URL}
payos.cancel-url=${PAYOS_CANCEL_URL}
