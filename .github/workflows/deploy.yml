name: Build And Deploy Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test Server Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend tests
        working-directory: v-sign-be
        run: mvn -q -Dtest=LearningWorkflowIT,SubscriptionControllerIT,HealthControllerIT test

      - name: AI syntax check
        working-directory: v-sign-be-ai
        run: python -m py_compile api_server.py

  publish:
    name: Build And Push GHCR Images
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_owner: ${{ steps.meta.outputs.image_owner }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          echo "image_owner=${IMAGE_OWNER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_OWNER=${IMAGE_OWNER}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: v-sign-be
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vsign-backend:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vsign-backend:latest

      - name: Build and push AI
        uses: docker/build-push-action@v6
        with:
          context: v-sign-be-ai
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vsign-ai:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vsign-ai:latest

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Package deploy bundle
        run: |
          mkdir -p deploy-bundle
          cp docker-compose.prod.yml deploy-bundle/docker-compose.prod.yml
          cp Caddyfile deploy-bundle/Caddyfile
          cp .env.prod.example deploy-bundle/.env.prod.example
          cp .env.ai.prod.example deploy-bundle/.env.ai.prod.example
          cp .env.deploy.example deploy-bundle/.env.deploy.example
          tar -czf deploy-bundle.tgz -C deploy-bundle .

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Upload deploy bundle
        shell: bash
        run: |
          scp deploy-bundle.tgz "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/vsign-deploy-bundle.tgz"

      - name: Pull images and restart services
        shell: bash
        env:
          IMAGE_OWNER: ${{ needs.publish.outputs.image_owner }}
          IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}" \
            IMAGE_OWNER="${IMAGE_OWNER}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            APP_DOMAIN="${APP_DOMAIN}" \
            GHCR_USERNAME="${GHCR_USERNAME}" \
            GHCR_TOKEN="${GHCR_TOKEN}" \
            DEPLOY_PATH="${DEPLOY_PATH:-/opt/vsign}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          mkdir -p "$DEPLOY_PATH"
          tar -xzf /tmp/vsign-deploy-bundle.tgz -C "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          if [ ! -f .env.prod ]; then
            echo "Missing $DEPLOY_PATH/.env.prod. Create it from .env.prod.example before first deploy." >&2
            exit 1
          fi

          {
            echo "GHCR_OWNER=$IMAGE_OWNER"
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "APP_DOMAIN=$APP_DOMAIN"
          } > .env.deploy

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose --env-file .env.deploy -f docker-compose.prod.yml pull
          docker compose --env-file .env.deploy -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -af --filter "until=168h"
          docker compose --env-file .env.deploy -f docker-compose.prod.yml ps
REMOTE
